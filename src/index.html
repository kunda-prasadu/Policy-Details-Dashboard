<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <!--
    WHY THIS TITLE: "Policy Hub — Chubb APAC" appears in browser tabs, OS task
    switchers, and SEO metadata. Branding is set here rather than dynamically
    to ensure correct rendering before JavaScript executes (SSR-first).
  -->
  <title>Policy Hub — Chubb APAC</title>

  <base href="/">

  <!--
    Viewport meta: width=device-width prevents mobile browsers from zooming out.
    initial-scale=1 ensures 1:1 CSS-pixel mapping on high-DPI screens.
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Chubb APAC Policy Management Dashboard — real-time policy portfolio visibility across regions and lines of business.">

  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!--
    DECISION: Roboto loaded via preconnect + preload, NOT a blocking stylesheet.
    ALTERNATIVES CONSIDERED: <link rel="stylesheet" href="fonts.googleapis.com/...">
    REASON: A blocking stylesheet delays First Contentful Paint. Preconnect opens
    the TCP/TLS handshake early; the font display:swap in the CSS means text
    renders immediately in the fallback font while Roboto loads asynchronously.
    The <noscript> fallback ensures the font still loads without JS.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload"
        as="style"
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
        onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap">
  </noscript>

  <!--
    DECISION: Material Icons served from local node_modules/material-icons, NOT
    the Google Fonts CDN link.
    ALTERNATIVES CONSIDERED: <link href="https://fonts.googleapis.com/icon?family=Material+Icons">
    REASON: CDN link adds a render-blocking request to an external origin. The
    local copy (bundled via angular.json styles array) is served from the same
    origin, counted against our own caching budget, and works fully offline /
    in air-gapped environments. No CDN link is included here.
  -->
</head>
<body>
  <app-root></app-root>
</body>
</html>
