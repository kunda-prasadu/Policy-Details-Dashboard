<!--
  WHY mat-toolbar as the persistent header:
  MatToolbar provides the correct Material 3 elevation, background token
  (--mat-toolbar-container-background-color maps to --mat-sys-surface), and
  a11y landmark role="banner" out of the box. It also participates correctly
  in the Material 3 scroll behaviours if a scrolling container is added later.

  WHY "Policy Hub" / "Chubb APAC" two-line brand:
  "Policy Hub" is the product name; "Chubb APAC" is the organisational context.
  Separating them into title/subtitle allows each to be styled independently
  and makes the brand legible at small screen widths where the subtitle wraps
  or hides via CSS.
-->

<mat-toolbar class="app-toolbar" role="banner">

  <!-- Brand identity -->
  <div class="app-toolbar__brand">
    <span class="app-toolbar__title">Policy Hub</span>
    <span class="app-toolbar__subtitle">Chubb APAC</span>
  </div>

  <!-- Flex spacer pushes actions to the right -->
  <span class="app-toolbar__spacer" aria-hidden="true"></span>

  <!-- Toolbar actions: palette picker + dark/light toggle -->
  <div class="app-toolbar__actions">

    <!--
      ThemePickerComponent: palette icon button opens a 5x2 MatMenu swatch grid.
      Defined in src/app/shared/theme-picker/theme-picker.ts.
    -->
    <app-theme-picker />

    <!--
      Dark / Light mode toggle.
      aria-label is dynamic so screen readers announce the current state and
      the action that will result from pressing the button.
    -->
    <button
      mat-icon-button
      [attr.aria-label]="theme.isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
      [matTooltip]="theme.isDark() ? 'Light mode' : 'Dark mode'"
      matTooltipPosition="below"
      (click)="theme.toggle()"
    >
      <mat-icon>{{ theme.isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>

  </div>

</mat-toolbar>

<!-- Feature pages are rendered here by the Angular Router -->
<router-outlet />
